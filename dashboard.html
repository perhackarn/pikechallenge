<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1B2A4A">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Pike Challenge – Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="navbar">
    <div class="brand"><span id="teamTitle">Pike Challenge</span></div>
    <nav>
      <a href="scoreboard.html">Resultattavla</a>
      <button id="logoutBtn">Logga ut</button>
    </nav>
  </div>

  <div class="container">
    <!-- Stats -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card">
        <div class="stat-value" id="statCm">0</div>
        <div class="stat-label">Centimeterjakten</div>
      </div>
      <div class="stat-card accent">
        <div class="stat-value" id="stat700">0</div>
        <div class="stat-label">av 700 cm</div>
      </div>
      <div class="stat-card success">
        <div class="stat-value" id="statCount">0</div>
        <div class="stat-label">Registrerade fångster</div>
      </div>
    </div>

    <!-- 700-progress -->
    <div class="card" id="progress700Card">
      <div class="card-header">
        <h2>700-tävlingen</h2>
        <span id="progress700Text" class="text-sm">0 / 700 cm</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress700Fill" style="width:0%"></div>
      </div>
    </div>

    <!-- Registrera fångst -->
    <div class="card">
      <div class="card-header">
        <h2>Registrera fångst</h2>
      </div>
      <form id="catchForm">
        <div class="form-group">
          <label for="memberSelect">Vem fångade?</label>
          <select id="memberSelect" required>
            <option value="">Välj lagmedlem...</option>
          </select>
        </div>

        <div class="form-group">
          <label>Art</label>
          <div class="radio-group">
            <input type="radio" name="species" id="speciesPike" value="pike" checked>
            <label for="speciesPike">Gädda</label>
            <input type="radio" name="species" id="speciesOther" value="other">
            <label for="speciesOther">Annan art</label>
          </div>
        </div>

        <div class="form-group hidden" id="otherSpeciesGroup">
          <label for="speciesName">Ange art</label>
          <input type="text" id="speciesName" placeholder="T.ex. Abborre" list="speciesList">
          <datalist id="speciesList">
            <option value="Abborre">
            <option value="Gös">
            <option value="Lake">
            <option value="Öring">
            <option value="Lax">
            <option value="Asp">
            <option value="Id">
            <option value="Braxen">
            <option value="Sik">
            <option value="Mört">
          </datalist>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="lengthCm">Längd (cm)</label>
            <input type="number" id="lengthCm" required min="1" max="200" step="0.5" placeholder="Längd i cm">
          </div>
          <div class="form-group" id="weightGroup">
            <label for="weightGrams">Vikt (gram)</label>
            <input type="number" id="weightGrams" min="1" max="30000" step="1" placeholder="Vikt i gram">
          </div>
        </div>

        <button class="btn btn-success btn-full" type="submit">Registrera fångst</button>
      </form>
    </div>

    <!-- Lagets fångster -->
    <div class="card">
      <div class="card-header">
        <h2>Lagets fångster</h2>
        <span class="text-sm" id="catchCountLabel">0 fångster</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Tid</th>
              <th>Medlem</th>
              <th>Art</th>
              <th>Längd</th>
              <th>Vikt</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="teamCatches">
            <tr><td colspan="6" class="text-center text-sm" style="padding:2rem;">Inga fångster ännu</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- MODAL: Redigera fångst -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <h2>Redigera fångst</h2>
      <form id="editForm">
        <input type="hidden" id="editId">
        <div class="form-group">
          <label for="editMember">Vem fångade?</label>
          <select id="editMember" required></select>
        </div>
        <div class="form-group">
          <label>Art</label>
          <div class="radio-group">
            <input type="radio" name="editSpecies" id="editPike" value="pike" checked>
            <label for="editPike">Gädda</label>
            <input type="radio" name="editSpecies" id="editOther" value="other">
            <label for="editOther">Annan art</label>
          </div>
        </div>
        <div class="form-group hidden" id="editOtherGroup">
          <label for="editSpeciesName">Ange art</label>
          <input type="text" id="editSpeciesName" placeholder="T.ex. Abborre">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="editLength">Längd (cm)</label>
            <input type="number" id="editLength" required min="1" max="200" step="0.5">
          </div>
          <div class="form-group" id="editWeightGroup">
            <label for="editWeight">Vikt (gram)</label>
            <input type="number" id="editWeight" min="1" max="30000" step="1">
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-outline" id="cancelEditBtn">Avbryt</button>
          <button type="button" class="btn btn-danger" id="deleteEditBtn">Ta bort</button>
          <button type="submit" class="btn btn-primary">Spara</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast-container"></div>
  <div id="loader"><div class="spinner"></div></div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
